<!doctype html>
<html lang="zh-Hant-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Balkazar｜照片集</title>
  <meta name="description" content="Balkazar 現場照片：Celebration Canada、Urban Nomad Freakout、跨年演出，以及舞台之外的樂團身影。">
  <link rel="canonical" href="https://balkazar.org/zh/gallery/">
  <link rel="alternate" hreflang="en" href="https://balkazar.org/gallery/">
  <link rel="alternate" hreflang="zh-Hant-TW" href="https://balkazar.org/zh/gallery/">
  <link rel="alternate" hreflang="x-default" href="https://balkazar.org/gallery/">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Balkazar｜照片集">
  <meta property="og:description" content="音樂祭、官方活動與台灣各地演出的現場照片。">
  <meta property="og:url" content="https://balkazar.org/zh/gallery/">
  <meta property="og:image" content="https://balkazar.org/assets/images/gallery/g-celebration-canada.jpg">
  <meta name="theme-color" content="#17110d">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+TC:wght@400;500;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../styles.css">
  <style>
    body { font-family: "Noto Sans TC", system-ui, sans-serif; }
    .gallery-hero h1, .photo-section h2 { font-family: "Noto Sans TC", sans-serif; font-weight: 900; letter-spacing: -.03em; text-transform: none; }
    .gallery-hero { background: var(--ink); color: var(--white); padding: 10rem max(1.25rem, calc((100vw - var(--max))/2)) 4rem; }
    .gallery-hero h1 { font-size: clamp(2.6rem,6vw,4.5rem); line-height: 1.08; margin: 0 0 1rem; }
    .gallery-hero .lede { max-width: 44em; }
    .photo-section { margin: auto; max-width: var(--max); padding: clamp(3rem, 7vw, 5rem) 1.25rem; }
    .photo-section h2 { font-size: clamp(1.8rem, 4vw, 2.6rem); margin-bottom: 2rem; }
    .photo-masonry { column-count: 3; column-gap: 1rem; }
    .photo-masonry img { border-radius: 2px; cursor: zoom-in; display: block; margin-bottom: 1rem; transition: opacity .2s; width: 100%; }
    .photo-masonry img:hover { opacity: .88; }
    @media (max-width: 880px) { .photo-masonry { column-count: 2; } }
    @media (max-width: 560px) { .photo-masonry { column-count: 1; } .gallery-hero { padding-top: 8rem; } }
  </style>
</head>
<body>
  <nav class="nav compact-nav" aria-label="主要選單">
    <div class="nav-inner">
      <a class="logo" href="../">Balkazar<span>.</span></a>
      <div class="links" style="display:flex"><a href="../">樂團首頁</a><a href="../epk/">媒體資料</a><a class="nav-cta" href="../#inquiry">詢問檔期</a></div>
    </div>
  </nav>

  <header class="gallery-hero">
    <p class="eyebrow">照片</p>
    <h1>現場、巡演、舞台之外。</h1>
    <p class="lede">Celebration Canada、Urban Nomad、跨年煙火下的演出，還有中場休息時的樂團身影。點擊照片可放大檢視。</p>
  </header>

  <main>
    <section class="photo-section">
      <h2>現場與音樂祭</h2>
      <div class="photo-masonry">
        <img src="../../assets/images/gallery/g-veggiefest-band.jpg" alt="全團在戶外舞台演出，暖色燈光" loading="lazy">
        <img src="../../assets/images/gallery/g-urban-nomad.jpg" alt="Balkazar 在 Urban Nomad Freakout 音樂祭現場演出" loading="lazy">
        <img src="../../assets/images/gallery/g-bw-full-band.jpg" alt="全團現場演出黑白照" loading="lazy">
        <img src="../../assets/images/gallery/g-crowd-nye.jpg" alt="Balkazar 在夜間戶外大型人群前演出" loading="lazy">
        <img src="../../assets/images/gallery/g-nye-fireworks.jpg" alt="長號手在跨年煙火下演出" loading="lazy">
        <img src="../../assets/images/gallery/g-bw-guitar-solo.jpg" alt="吉他手獨奏黑白照" loading="lazy">
        <img src="../../assets/images/gallery/g-dance-floor.jpg" alt="觀眾在 Balkazar 台北演出現場跳舞" loading="lazy">
        <img src="../../assets/images/gallery/g-kalinka.jpg" alt="Balkazar 現場演出" loading="lazy">
        <img src="../../assets/images/gallery/g-niska-banja.jpg" alt="Balkazar 現場演出 Niska Banja" loading="lazy">
      </div>
    </section>

    <section class="photo-section">
      <h2>Celebration Canada</h2>
      <div class="photo-masonry">
        <img src="../../assets/images/gallery/g-celebration-canada.jpg" alt="鼓手在 Celebration Canada 舞台演出，背後為加拿大楓葉背板" loading="lazy">
        <img src="../../assets/images/gallery/g-canadaday-trombone.jpg" alt="長號手在 Celebration Canada 演出" loading="lazy">
      </div>
    </section>

    <section class="photo-section">
      <h2>舞台之外</h2>
      <div class="photo-masonry">
        <img src="../../assets/images/gallery/g-forest-portrait.jpg" alt="團員造型戶外合照" loading="lazy">
        <img src="../../assets/images/gallery/g-marko-singing.jpg" alt="Balkazar 主唱兼吉他手近照" loading="lazy">
        <img src="../../assets/images/gallery/g-candid-group.jpg" alt="Balkazar 團員演出後合照" loading="lazy">
      </div>
    </section>
  </main>

  <footer>
    <a class="logo" href="../">Balkazar<span>.</span></a>
    <p>演出邀約與媒體：<a href="../#inquiry">聯絡表單 ↗</a></p>

    <small>© <span id="year"></span> Balkazar</small>
  </footer>
  <script src="../../script.js"></script>
</body>
</html>
